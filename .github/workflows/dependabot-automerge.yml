# Dependabot の patch / minor 更新PRを自動マージする。
# major (semver-major) は対象外なので、別PRのまま残り人間がレビューする。
# 前提(リポジトリ設定):
#   1. Settings → General → "Allow auto-merge" を有効化
#   2. main のブランチ保護で CI (server / client / scripts) を required checks に設定
#      ※未設定だと --auto は CI を待たずに即マージされる
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for patch / minor
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
