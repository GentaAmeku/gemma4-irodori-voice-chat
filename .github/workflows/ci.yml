# 自動チェック一式。pre-commit / Claude Code フックと同じ内容を CI でも保証する。
# 内訳: server(ruff + pytest) / client(prettier + svelte-check + build + Playwright E2E) / scripts(bash -n)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pytest

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      # E2E はモックの会話サーバー(uv)を Playwright が自動起動する
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
        working-directory: server
      - run: pnpm install --frozen-lockfile
        working-directory: client
      - run: pnpm format:check
        working-directory: client
      - run: pnpm check
        working-directory: client
      - run: pnpm build
        working-directory: client
      # Playwright のブラウザをキャッシュ(ロックファイルが変わらない限り再ダウンロードしない)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: client
      - run: pnpm test:e2e
        working-directory: client

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: bash -n scripts/*.sh scripts/mac/*.sh scripts/wsl/*.sh
      # check-all / start-stack スキルは Claude Code(.claude)と Codex(.agents)の両方に
      # 同一内容で置いている。片方だけ編集されて中身がズレたら CI で落とす
      - name: Check skill copies stay in sync (.claude/skills <-> .agents/skills)
        run: |
          for s in check-all start-stack; do
            diff ".claude/skills/$s/SKILL.md" ".agents/skills/$s/SKILL.md"
          done
